name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug features (mock overlay, MCP plugin)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - platform: macos-14
            target: x86_64-apple-darwin
            label: macos-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version from tauri.conf.json
        id: version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' app/src-tauri/tauri.conf.json | head -1 | cut -d'"' -f4)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libx11-dev \
            libxdo-dev \
            libwayland-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: app/package.json

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
          shared-key: ${{ matrix.label }}

      - name: Build and bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ github.event.release.tag_name || steps.version.outputs.tag }}
          releaseName: ${{ github.event.release.name || format('PoE Inspect {0}', steps.version.outputs.tag) }}
          releaseId: ${{ github.event.release.id || '' }}
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: false
          includeUpdaterJson: true
